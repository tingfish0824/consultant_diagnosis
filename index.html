<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>諮詢師角色自我診斷</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeece7;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9b9b9b;
    --border: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.2);
    --radius-md: 8px;
    --radius-lg: 12px;
    --purple: #7F77DD;
    --purple-dark: #534AB7;
    --purple-light: #EEEDFE;
    --purple-text: #3C3489;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg-secondary: #2c2c2e;
      --bg-tertiary: #3a3a3c;
      --text: #f5f5f5;
      --text-secondary: #ababab;
      --text-tertiary: #6e6e73;
      --border: rgba(255,255,255,0.1);
      --border-secondary: rgba(255,255,255,0.2);
      --purple-light: #2a2760;
      --purple-text: #AFA9EC;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-secondary);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 2rem;
    width: 100%;
    max-width: 560px;
  }
  .brand {
    font-size: 12px;
    color: var(--text-tertiary);
    letter-spacing: 0.06em;
    margin-bottom: 1.5rem;
  }
  .prog-bg { height: 4px; background: var(--bg-secondary); border-radius: 2px; margin-bottom: 2rem; }
  .prog-fill { height: 4px; background: var(--purple); border-radius: 2px; transition: width 0.4s ease; }
  .step-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px; letter-spacing: 0.04em; }
  .scene-tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; background: var(--purple-light); color: var(--purple-text); margin-bottom: 10px; letter-spacing: 0.03em; }
  .q-text { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; line-height: 1.5; }
  .q-hint { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
  .opts { display: flex; flex-direction: column; gap: 8px; }
  .opt { display: flex; align-items: flex-start; gap: 10px; background: var(--bg); border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 11px 14px; font-size: 14px; color: var(--text); cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; line-height: 1.5; width: 100%; font-family: inherit; }
  .opt:hover { background: var(--bg-secondary); }
  .opt.sel { border: 1.5px solid var(--purple); background: var(--purple-light); color: var(--purple-text); }
  .opt-dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border-secondary); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .opt.sel .opt-dot { border-color: var(--purple); background: var(--purple); }
  .opt-dot-inner { width: 6px; height: 6px; border-radius: 50%; background: #fff; display: none; }
  .opt.sel .opt-dot-inner { display: block; }
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btn { background: var(--bg); border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 9px 20px; font-size: 14px; cursor: pointer; color: var(--text); font-family: inherit; transition: background 0.15s; }
  .btn:hover { background: var(--bg-secondary); }
  .btn.primary { background: var(--purple); color: #fff; border-color: var(--purple); font-weight: 500; }
  .btn.primary:hover { background: var(--purple-dark); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn.full { width: 100%; margin-top: 12px; }
  .result-header { text-align: center; padding: 0.5rem 0 1.5rem; }
  .result-type { font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .result-pct { font-size: 32px; font-weight: 500; color: var(--purple); margin: 4px 0; }
  .result-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.6; max-width: 360px; margin: 0 auto 1.5rem; }
  .radar-wrap { display: flex; justify-content: center; margin-bottom: 1.5rem; }
  .dim-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
  .dim-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 12px; }
  .dim-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 6px; border-radius: 4px; margin-bottom: 8px; }
  .dim-score-num { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .dim-bar-bg { height: 4px; background: var(--bg-secondary); border-radius: 2px; margin-bottom: 6px; }
  .dim-bar-fill { height: 4px; border-radius: 2px; }
  .dim-advice-txt { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin: 1.2rem 0 0.6rem; }
  .highlight-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 1rem; }
  .highlight-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .highlight-text { font-size: 14px; color: var(--text); line-height: 1.6; }
  .action-list { list-style: none; padding: 0; margin: 0 0 1rem; }
  .action-list li { font-size: 13px; color: var(--text-secondary); padding: 8px 0; border-bottom: 0.5px solid var(--border); line-height: 1.5; display: flex; gap: 8px; }
  .action-list li:last-child { border-bottom: none; }
  .action-num { font-size: 12px; font-weight: 500; color: var(--purple); flex-shrink: 0; padding-top: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">諮詢師角色診斷</div>
  <div id="app"></div>
</div>

<script>
const questions = [
  { dim:"信任建立", scene:"情境：患者初次到診，表情有點緊張", text:"你最常做的第一件事是什麼？", hint:"選最接近你真實狀況的，不是「應該做」的。", opts:[{text:"微笑寒暄，問他今天怎麼來的、有什麼期待",score:4},{text:"先介紹診所環境與我們的專業背景",score:2},{text:"直接進入需求確認，問他想改善哪裡",score:3},{text:"給他資料先看，自己等他有問題再說",score:1}]},
  { dim:"信任建立", scene:"情境：患者問「你們有沒有失敗過？」", text:"這個問題你通常怎麼回應？", hint:"誠實選出你真正的第一反應。", opts:[{text:"坦然說明可能的風險，以及出現時如何處理",score:4},{text:"分享一個有良好結局的真實案例",score:3},{text:"說「每個人狀況不同，我們都會仔細評估」",score:2},{text:"轉移話題，強調高成功率數字",score:1}]},
  { dim:"降低不確定感", scene:"情境：患者說「我怕效果不好，還在猶豫」", text:"你的第一個回應是？", hint:"", opts:[{text:"先問他最擔心哪一部分，聽完再回應",score:4},{text:"推薦先做體驗療程，降低嘗試門檻",score:3},{text:"說明退款保障或療程成功率",score:2},{text:"強調「其他患者反應都很好」",score:1}]},
  { dim:"降低不確定感", scene:"情境：說明費用時", text:"你通常怎麼開始談費用？", hint:"", opts:[{text:"先了解患者需求與顧慮，再討論費用",score:4},{text:"先問患者預算，再推薦合適方案",score:3},{text:"直接列出方案價格，說明CP值",score:2},{text:"強調「這個價格真的很划算」",score:1}]},
  { dim:"陪伴決策", scene:"情境：患者猶豫了很久，遲遲沒有決定", text:"你通常怎麼做？", hint:"", opts:[{text:"和患者一起把顧慮逐一釐清，再幫他整理選擇",score:4},{text:"讓患者把資料帶回去慢慢想",score:3},{text:"明確建議一個方案，請他直接決定",score:2},{text:"說今天有優惠，建議盡快決定",score:1}]},
  { dim:"陪伴決策", scene:"情境：患者當天沒決定，離開了", text:"你事後會怎麼跟進？", hint:"", opts:[{text:"傳一則針對他當天顧慮的個性化訊息",score:4},{text:"Line 問他考慮得怎樣了",score:2},{text:"寄送療程介紹資料或活動通知",score:1},{text:"等患者自己回來，不想打擾",score:2}]},
  { dim:"主動傾聽", scene:"情境：諮詢過程中", text:"你說話與傾聽的比例大概是？", hint:"直覺選，不用計算。", opts:[{text:"我說約 30–40%，患者說 60–70%",score:4},{text:"各說約 50%，輪流表達",score:3},{text:"我說約 60–70%，患者說 30–40%",score:2},{text:"我說約 80% 以上，我負責介紹",score:1}]},
  { dim:"主動傾聽", scene:"情境：患者說了你沒完全聽懂的需求", text:"你的第一反應是？", hint:"", opts:[{text:"立刻停下來，直接問清楚",score:4},{text:"用自己的理解繼續說，順帶確認「是這樣嗎？」",score:3},{text:"先繼續說，等一下找機會再問",score:2},{text:"假裝聽懂，推進到下一個話題",score:1}]},
];

const dims = ["信任建立","降低不確定感","陪伴決策","主動傾聽"];
const dimColors = {"信任建立":"#7F77DD","降低不確定感":"#1D9E75","陪伴決策":"#D85A30","主動傾聽":"#185FA5"};
const dimBg = {"信任建立":"#EEEDFE","降低不確定感":"#E1F5EE","陪伴決策":"#FAECE7","主動傾聽":"#E6F1FB"};
const dimTxt = {"信任建立":"#3C3489","降低不確定感":"#085041","陪伴決策":"#712B13","主動傾聽":"#0C447C"};

let cur = 0, answers = Array(questions.length).fill(null);

function getDimScore(dim) {
  let total = 0, count = 0;
  questions.forEach((q,i) => { if(q.dim===dim && answers[i]!==null){total+=q.opts[answers[i]].score;count++;} });
  return count > 0 ? Math.round((total/count/4)*100) : 0;
}

function dimAdvice(dim, s) {
  const m = {
    "信任建立":{h:"你能讓患者快速卸下防備，這是一切的起點。",m:"信任意識到位，但面對質疑時可以更主動坦誠。",l:"建議先放慢介紹節奏，多讓患者感受到被重視。"},
    "降低不確定感":{h:"你能精準找到患者的不安，並主動化解它。",m:"已有降低不安的意識，費用溝通可以更以患者為主。",l:"患者猶豫多來自「不知道」，養成主動問出顧慮的習慣。"},
    "陪伴決策":{h:"你不急著成交，而是真的陪患者走到決定。",m:"陪伴感不錯，追蹤訊息可以再個性化一點。",l:"引導不等於施壓，試著幫患者整理選擇而非催促。"},
    "主動傾聽":{h:"你讓患者說得比你多，他們感受到被真正理解。",m:"傾聽意識良好，可以再少一點打斷。",l:"每說一段話後，試著問一個問題，練習傾聽節奏。"},
  };
  const a = m[dim]; return s>=75?a.h:s>=50?a.m:a.l;
}

function renderRadar() {
  const size=160,cx=80,cy=80,r=55;
  const angles = dims.map((_,i)=>(i/dims.length)*Math.PI*2-Math.PI/2);
  function pt(i,frac){return[cx+Math.cos(angles[i])*r*frac,cy+Math.sin(angles[i])*r*frac];}
  const gridLevels=[0.25,0.5,0.75,1];
  let grid=gridLevels.map(lv=>{const pts=dims.map((_,i)=>pt(i,lv).join(",")).join(" ");return`<polygon points="${pts}" fill="none" stroke="#ddd" stroke-width="0.5"/>`;}).join("");
  const dataFrac=dims.map(d=>getDimScore(d)/100);
  const dataPts=dims.map((_,i)=>pt(i,dataFrac[i]).join(",")).join(" ");
  const axes=dims.map((_,i)=>{const[x2,y2]=pt(i,1);return`<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#ddd" stroke-width="0.5"/>`;}).join("");
  const lbls=dims.map((l,i)=>{const[x,y]=pt(i,1+14/r);const anchor=x<cx-2?"end":x>cx+2?"start":"middle";return`<text x="${x}" y="${y}" text-anchor="${anchor}" font-size="10" fill="#888" font-family="-apple-system,sans-serif">${l}</text>`;}).join("");
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${grid}${axes}<polygon points="${dataPts}" fill="#7F77DD" fill-opacity="0.18" stroke="#7F77DD" stroke-width="1.5"/>${dims.map((_,i)=>{const[x,y]=pt(i,dataFrac[i]);return`<circle cx="${x}" cy="${y}" r="3" fill="#7F77DD"/>`;}).join("")}${lbls}</svg>`;
}

function renderResult() {
  const total=Math.round(answers.reduce((s,a,i)=>s+(a!==null?questions[i].opts[a].score:0),0));
  const pct=Math.round(total/(questions.length*4)*100);
  let type,typeDesc,nextSteps;
  if(pct>=78){type="高成交諮詢師";typeDesc="你已內化「陪伴決策」思維，能主動降低患者不安，從第一句話就建立信任。患者在你這裡感到被理解，決定自然而然。";nextSteps=["持續深化最弱的維度，讓整體更均衡","嘗試帶新人，把你的直覺系統化成 SOP","追蹤自己的諮詢成交率，找出可再優化的環節"];}
  else if(pct>=52){type="成長型諮詢師";typeDesc="你已有傾聽與信任的意識，但部分環節仍偏向「說明方案」而非「陪伴患者」。強化弱項維度，可以顯著提升轉換率。";nextSteps=["練習在每次諮詢中，讓患者說超過你 50%","追蹤後，下次試著傳一則個性化訊息而非通用資料","每週選一題反思：如果重來，我會怎麼說？"];}
  else{type="推薦型諮詢師";typeDesc="你的諮詢模式以「介紹方案」為主，較少深入了解患者的真實顧慮。患者需要的是安心，不是資訊量。從傾聽開始調整。";nextSteps=["每次諮詢開場，先問一個關於「患者期待」的問題","下次患者說「我要想想」，先問他在擔心什麼","練習說完一段介紹後，停下來問：「你對這部分有什麼感覺？」"];}
  const weakDim=dims.reduce((w,d)=>getDimScore(d)<getDimScore(w)?d:w,dims[0]);
  const weakScore=getDimScore(weakDim);
  document.getElementById('app').innerHTML=`
    <div class="result-header">
      <div class="result-type">${type}</div>
      <div class="result-pct">${pct}%</div>
      <div class="result-sub">${typeDesc}</div>
    </div>
    <div class="radar-wrap">${renderRadar()}</div>
    <div class="dim-grid">
      ${dims.map(d=>{const s=getDimScore(d);return`<div class="dim-card"><div class="dim-badge" style="background:${dimBg[d]};color:${dimTxt[d]}">${d}</div><div class="dim-score-num" style="color:${dimColors[d]}">${s}%</div><div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${s}%;background:${dimColors[d]}"></div></div><div class="dim-advice-txt">${dimAdvice(d,s)}</div></div>`;}).join("")}
    </div>
    <div class="section-title">最需要加強的維度</div>
    <div class="highlight-box">
      <div class="highlight-label" style="color:${dimTxt[weakDim]}">${weakDim} · ${weakScore}%</div>
      <div class="highlight-text">${dimAdvice(weakDim,weakScore)}</div>
    </div>
    <div class="section-title">本週可以試試</div>
    <ul class="action-list">${nextSteps.map((s,i)=>`<li><span class="action-num">0${i+1}</span><span>${s}</span></li>`).join("")}</ul>
    <button class="btn full" onclick="restart()">重新診斷</button>
  `;
}

function render() {
  if(cur>=questions.length){renderResult();return;}
  const q=questions[cur];
  const prog=Math.round(cur/questions.length*100);
  document.getElementById('app').innerHTML=`
    <div class="prog-bg"><div class="prog-fill" style="width:${prog}%"></div></div>
    <div class="step-label">第 ${cur+1} 題，共 ${questions.length} 題</div>
    <div class="scene-tag">${q.scene}</div>
    <div class="q-text">${q.text}</div>
    ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}
    <div class="opts">${q.opts.map((o,i)=>`<button class="opt${answers[cur]===i?' sel':''}" onclick="sel(${i})"><span class="opt-dot"><span class="opt-dot-inner"></span></span><span>${o.text}</span></button>`).join('')}</div>
    <div class="nav">
      <button class="btn" onclick="go(-1)" ${cur===0?'disabled':''}>← 上一題</button>
      <button class="btn primary" onclick="go(1)" ${answers[cur]===null?'disabled':''}>${cur===questions.length-1?'查看結果 →':'下一題 →'}</button>
    </div>
  `;
}

function sel(i){answers[cur]=i;render();}
function go(d){if(d===1&&answers[cur]===null)return;cur=Math.max(0,cur+d);render();}
function restart(){cur=0;answers=Array(questions.length).fill(null);render();}

render();
</script>
</body>
</html>
